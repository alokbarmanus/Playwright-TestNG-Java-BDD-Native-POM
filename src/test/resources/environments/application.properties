test.success.screenshots=0
# ============================================================
# application.properties
# Common, environment-agnostic configuration shared by all
# environments. Environment-specific values (URL, DB, etc.)
# belong in the corresponding <env>.properties file.
# ============================================================

# Default environment - used when the JVM system property
# -Denv=<name> is not provided at runtime.
default.env=dev

# Base URL for the application under test
env.baseurl=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login

# Browser: chromium | firefox | webkit
browser=chromium

# Browser to launch: chromium | firefox | webkit
browser.name=chromium

# Run headless: true | false
headless=false

# Browser viewport
viewport.width=1280
viewport.height=720

# Implicit timeout (milliseconds)
default.timeout=30000

# Proxy settings
system.http.proxyHost=proxy.xyz.com
system.http.proxyPort=8080

# ── Remote execution via Playwright Browser Server ────────────────
# Set remote.execution=true to connect to a running Playwright server
# instead of launching a local browser process.
# HOW TO START THE SERVER on the remote machine:
#   mvn exec:java \
#     -Dexec.mainClass=com.microsoft.playwright.CLI \
#     -Dexec.args="run-server --port 8080" \
#     -Dexec.classpathScope=test
#
# Then set remote.server.url to ws://<HOST>:8080/
# Override at runtime: -Dremote.execution=true -Dremote.server.url=ws://192.168.1.10:8080/
remote.execution=false
remote.server.url=ws://localhost:8080/

# ==============Playwright Properties==========================
playwright.wait.timeout=30000
playwright.init.retry.timeout=10000

test.success.screenshots=0
test.failure.screenshots=1

test.retry.count=3
